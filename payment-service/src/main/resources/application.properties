spring.application.name=payment-service

# =========================================
# SERVER CONFIG
# =========================================
server.port=8082

# =========================================
# POSTGRES CONFIG
# =========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/orders_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Avoid timezone issues
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# =========================================
# KAFKA CONFIG (CONSUMER)
# =========================================
spring.kafka.bootstrap-servers=localhost:9092

# Consumer group
spring.kafka.consumer.group-id=order-group

# Read from beginning (useful for dev/testing)
spring.kafka.consumer.auto-offset-reset=earliest

# Key + Value deserializers
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.use.type.headers=false

# TRUST PACKAGE (IMPORTANT for JSON)
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# (Optional but recommended)
spring.kafka.consumer.properties.spring.json.value.default.type=com.eventdriven.kf.paymentservice.dto.OrderEvent

# Concurrency (parallel consumers)
spring.kafka.listener.concurrency=2

# =========================================
# JACKSON (JSON HANDLING)
# =========================================
#spring.jackson.serialization.DateTimeFeature.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=Asia/Kolkata

# =========================================
# LOGGING
# =========================================
logging.level.org.springframework.kafka=INFO
logging.level.org.hibernate.SQL=DEBUG
